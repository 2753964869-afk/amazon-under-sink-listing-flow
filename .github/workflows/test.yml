name: test

on:
  push:
  pull_request:

jobs:
  offline-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -B -m unittest discover -s skills/amazon-under-sink-listing-flow/tests -v
      - name: Run offline preflight
        run: python -B skills/amazon-under-sink-listing-flow/scripts/preflight.py --mode asin --offline --json --workdir work/preflight
